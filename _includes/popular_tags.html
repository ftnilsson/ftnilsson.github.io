<div class="sbox">
  <div class="sbox-head">// POPULAR_TAGS.DAT</div>
  <div class="sbox-body">
    <ul class="tag-cloud">
      {% assign sorted_tags = site.tags | sort %}
      {% for tag in sorted_tags limit: 12 %}
        <li>
          <a href="{{ site.baseurl }}/tags/#{{ tag[0] | slugify }}">
            {{ tag[0] }} <span>[{% if tag[1].size < 10 %}0{% endif %}{{ tag[1].size }}]</span>
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
